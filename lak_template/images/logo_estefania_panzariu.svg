<?xml version="1.0" encoding="UTF-8"?>
<svg width="520" height="140" viewBox="0 0 520 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldRose" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C9A36A"/>
      <stop offset="100%" stop-color="#A77A4F"/>
    </linearGradient>
  </defs>

  <!-- Marca monograma EP -->
  <g transform="translate(10,18)">
    <!-- Marco exterior delgado -->
    <rect x="2" y="2" width="100" height="100" rx="6" fill="none"
          stroke="url(#goldRose)" stroke-width="2.5"/>
    <!-- E estilizada -->
    <path d="M28 30 H72 M28 30 V74 M28 52 H62 M28 74 H72"
          stroke="#2B2B2B" stroke-width="5"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- P entrelazada (acento) -->
    <path d="M76 30 V74 M76 30 H86 C92 30 95 35 95 42 C95 49 92 54 86 54 H76"
          stroke="url(#goldRose)" stroke-width="4"
          stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Texto principal -->
  <g transform="translate(135,55)">
    <text x="0" y="0"
          font-family="'Playfair Display', 'Marcellus', Georgia, serif"
          font-size="34"
          font-weight="600"
          letter-spacing="3"
          fill="#1F1F1F">ESTEFANIA</text>
    <text x="0" y="34"
          font-family="'Playfair Display', 'Marcellus', Georgia, serif"
          font-size="34"
          font-weight="600"
          letter-spacing="3"
          fill="#1F1F1F">PANZARIU</text>
    <!-- Tag elegante bajo el nombre -->
    <line x1="0" y1="48" x2="120" y2="48" stroke="url(#goldRose)" stroke-width="1.5"/>
    <text x="0" y="62"
          font-family="'Inter', Arial, sans-serif"
          font-size="9"
          font-weight="500"
          letter-spacing="4"
          fill="#7A6953">NAIL STUDIO · CUENCA</text>
  </g>
</svg>
